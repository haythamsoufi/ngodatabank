<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>502 - Bad Gateway</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;background:linear-gradient(135deg,#f5f7fa 0%,#c3cfe2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;color:#1f2937}
        .error-container{background:#fff;border-radius:24px;box-shadow:0 20px 60px rgba(0,0,0,.15);max-width:600px;width:100%;padding:48px;text-align:center;position:relative;overflow:hidden}
        .error-container:before{content:"";position:absolute;top:0;left:0;right:0;height:6px;background:linear-gradient(90deg,#ec4899 0%,#db2777 50%,#ec4899 100%)}
        .error-icon{width:120px;height:120px;margin:0 auto 32px;background:linear-gradient(135deg,#fce7f3 0%,#fbcfe8 100%);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#ec4899;animation:pulse 2s ease-in-out infinite}
        .error-icon svg{width:64px;height:64px;fill:currentColor}
        @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
        .error-code{font-size:72px;font-weight:800;background:linear-gradient(135deg,#ec4899 0%,#db2777 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;margin-bottom:16px;line-height:1}
        .error-title{font-size:28px;font-weight:700;color:#1f2937;margin-bottom:16px}
        .error-message{font-size:16px;color:#6b7280;line-height:1.6;margin-bottom:32px}
        .error-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:16px}
        .btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:8px;font-weight:600;text-decoration:none;transition:all .2s;font-size:14px;border:none;cursor:pointer}
        button.btn{font-family:inherit}
        .btn-primary{background:linear-gradient(135deg,#ec4899 0%,#db2777 100%);color:#fff;box-shadow:0 4px 12px rgba(236,72,153,.3)}
        .btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(236,72,153,.4)}
        .btn-secondary{background:#f3f4f6;color:#374151;border:1px solid #e5e7eb}
        .btn-secondary:hover{background:#e5e7eb;transform:translateY(-2px)}
        @media (max-width:640px){.error-container{padding:32px 24px}.error-code{font-size:56px}.error-title{font-size:24px}.error-icon{width:100px;height:100px}.error-icon svg{width:52px;height:52px}}
    </style>
    <script>
        (function(){
            var e=502;
            var p=window.location.protocol;
            if(p!=='http:'&&p!=='https:'){return;}

            var k='err_log_'+e+'_'+window.location.pathname;
            var seen=false;
            try{
                seen=!!sessionStorage.getItem(k);
                if(!seen){sessionStorage.setItem(k,'1');}
            }catch(_){}
            if(seen){return;}

            var d={error_code:e,url:window.location.href,referrer:document.referrer||null,user_agent:navigator.userAgent||null,timestamp:new Date().toISOString()};
            var u='/api/v1/platform-error';
            try{
                if(navigator.sendBeacon){
                    navigator.sendBeacon(u,new Blob([JSON.stringify(d)],{type:'application/json'}));
                }else if(window.fetch){
                    fetch(u,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d),keepalive:true}).catch(function(){});
                }
            }catch(_){}
        })();
    </script>
</head>
<body>
    <div class="error-container">
        <div class="error-icon"><svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg"><path d="M64 32C28.7 32 0 60.7 0 96v64c0 35.3 28.7 64 64 64H448c35.3 0 64-28.7 64-64V96c0-35.3-28.7-64-64-64H64zM344 152c-13.3 0-24-10.7-24-24s10.7-24 24-24s24 10.7 24 24s-10.7 24-24 24zm96-24c0 13.3-10.7 24-24 24s-24-10.7-24-24s10.7-24 24-24s24 10.7 24 24zM64 288c-35.3 0-64 28.7-64 64v64c0 35.3 28.7 64 64 64H448c35.3 0 64-28.7 64-64V352c0-35.3-28.7-64-64-64H64zM344 408c-13.3 0-24-10.7-24-24s10.7-24 24-24s24 10.7 24 24s-10.7 24-24 24zm104-24c0 13.3-10.7 24-24 24s-24-10.7-24-24s10.7-24 24-24s24 10.7 24 24z"/></svg></div>
        <div class="error-code">502</div>
        <h1 class="error-title">Bad Gateway</h1>
        <p class="error-message">The server received an invalid response. Please try again in a few moments.</p>
        <div class="error-actions">
            <button class="btn btn-primary" onclick="window.location.reload()">Retry</button>
            <a class="btn btn-secondary" href="/">Go to Homepage</a>
        </div>
    </div>
</body>
</html>
