<div class="emops-field" data-field-id="{{ field_id }}" data-country-iso="{{ country_iso or config.get('country_iso', '') }}" data-plugin-config='{{ (config | tojson | e) if config else "{}" }}' data-operations-count="0" data-eo1="" data-eo2="" data-eo3="">
  <div class="emops-body">
    <div class="text-center py-4 text-gray-500">
      <i class="fas fa-spinner fa-spin"></i>
      <span>Loading...</span>
      <div class="text-xs text-gray-400 mt-1">ISO: {{ country_iso or config.get('country_iso', '') }}</div>
    </div>
  </div>
</div>
