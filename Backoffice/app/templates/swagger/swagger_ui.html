<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% include 'components/_client_console_guard.html' %}
    <title>{{ ORG_NAME }} API Documentation</title>
    <link rel="stylesheet" type="text/css" href="https://unpkg.com/swagger-ui-dist@5.9.0/swagger-ui.css" />
    <link rel="icon" type="image/png" href="https://unpkg.com/swagger-ui-dist@5.9.0/favicon-32x32.png" sizes="32x32" />
    <link rel="icon" type="image/png" href="https://unpkg.com/swagger-ui-dist@5.9.0/favicon-16x16.png" sizes="16x16" />
    <style nonce="{{ csp_nonce() }}">
        html {
            box-sizing: border-box;
            overflow: -moz-scrollbars-vertical;
            overflow-y: scroll;
        }
        *, *:before, *:after {
            box-sizing: inherit;
        }
        body {
            margin: 0;
            background: #fafafa;
        }
    </style>
</head>
<body>
    <div id="swagger-ui"></div>

    <script src="https://unpkg.com/swagger-ui-dist@5.9.0/swagger-ui-bundle.js"></script>
    <script src="https://unpkg.com/swagger-ui-dist@5.9.0/swagger-ui-standalone-preset.js"></script>
    <script nonce="{{ csp_nonce() }}">
        window.onload = function() {
            window.__clientLog && window.__clientLog('Swagger UI: Initializing...');

            // Check if Swagger UI libraries loaded
            if (typeof SwaggerUIBundle === 'undefined') {
                console.error('Swagger UI: SwaggerUIBundle is not defined');
                document.getElementById('swagger-ui').innerHTML =
                    '<div style="padding: 20px; font-family: Arial;">' +
                    '<h2>Error: Swagger UI libraries failed to load</h2>' +
                    '<p>Please check your internet connection and refresh the page.</p>' +
                    '</div>';
                return;
            }

            if (typeof SwaggerUIStandalonePreset === 'undefined') {
                console.error('Swagger UI: SwaggerUIStandalonePreset is not defined');
                return;
            }

            const specUrl = window.location.origin + '/api-docs/openapi.json';
            window.__clientLog && window.__clientLog('Swagger UI: Loading spec from', specUrl);

            // Test if spec URL is accessible
            fetch(specUrl)
                .then(response => {
                    window.__clientLog && window.__clientLog('Swagger UI: Spec fetch response status', response.status);
                    if (!response.ok) {
                        throw new Error('HTTP ' + response.status + ': ' + response.statusText);
                    }
                    return response.json();
                })
                .then(spec => {
                    window.__clientLog && window.__clientLog('Swagger UI: Spec loaded successfully', {
                        openapi: spec.openapi,
                        paths: Object.keys(spec.paths || {}).length,
                        tags: spec.tags?.length || 0
                    });

                    // Initialize Swagger UI with inline spec
                    const ui = SwaggerUIBundle({
                        spec: spec,  // Use inline spec for better error handling
                        dom_id: '#swagger-ui',
                        deepLinking: true,
                        presets: [
                            SwaggerUIBundle.presets.apis,
                            SwaggerUIStandalonePreset
                        ],
                        plugins: [
                            SwaggerUIBundle.plugins.DownloadUrl
                        ],
                        layout: "StandaloneLayout",
                        validatorUrl: null,
                        tryItOutEnabled: true,
                        supportedSubmitMethods: ['get', 'post', 'put', 'delete', 'patch'],
                        onComplete: function() {
                            window.__clientLog && window.__clientLog('Swagger UI: Initialization complete');
                        }
                    });

                    window.swaggerUI = ui;
                    window.__clientLog && window.__clientLog('Swagger UI: Bundle created');
                })
                .catch(error => {
                    console.error('Swagger UI: Error loading spec', error);
                    const errContainer = document.getElementById('swagger-ui');
                    if (errContainer) {
                        errContainer.textContent = '';
                        const wrap = document.createElement('div');
                        wrap.style.cssText = 'padding:20px;font-family:Arial;color:red';
                        const h2 = document.createElement('h2');
                        h2.textContent = 'Error Loading API Documentation';
                        const pErr = document.createElement('p');
                        const strong = document.createElement('strong');
                        strong.textContent = 'Error: ';
                        pErr.appendChild(strong);
                        pErr.appendChild(document.createTextNode(error.message || String(error)));
                        const pCheck = document.createElement('p');
                        pCheck.textContent = 'Please check:';
                        const ul = document.createElement('ul');
                        const li1 = document.createElement('li');
                        li1.textContent = 'Server is running';
                        const li2 = document.createElement('li');
                        const link = document.createElement('a');
                        link.href = specUrl;
                        link.target = '_blank';
                        link.textContent = 'OpenAPI JSON is accessible';
                        li2.appendChild(link);
                        const li3 = document.createElement('li');
                        li3.textContent = 'Browser console for more details';
                        ul.appendChild(li1); ul.appendChild(li2); ul.appendChild(li3);
                        wrap.appendChild(h2); wrap.appendChild(pErr);
                        wrap.appendChild(pCheck); wrap.appendChild(ul);
                        errContainer.appendChild(wrap);
                    }
                });
        };
    </script>
</body>
</html>
