<script nonce="{{ csp_nonce() }}">
(function() {
  const el = document.getElementById('ag-grid-i18n-json');
  let data = {};
  try {
    data = el ? JSON.parse(el.textContent) : {};
  } catch (e) {
    data = {};
  }

  // Merge into a single global namespace used by the ag-grid helper/libs.
  const existing = window.agGridTranslations || {};
  const merged = Object.assign({}, existing, data);
  merged.localeText = Object.assign({}, existing.localeText || {}, (data && data.localeText) || {});
  window.agGridTranslations = merged;
})();
</script>
