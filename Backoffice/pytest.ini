[pytest]
# Pytest configuration for NGO Databank Backoffice

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=app
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    # --cov-fail-under=75  # Re-enable once full test suite reaches 75%
    --disable-warnings
    --junitxml=test_results.xml

# Test results are saved to test_results.log automatically via conftest.py hook

# Markers for test categorization
markers =
    unit: Unit tests (fast, no database)
    integration: Integration tests (require database)
    api: API endpoint tests
    slow: Slow running tests
    db: Tests that require database connection
    email: Email functionality tests
    static: Static file tests
    transaction: Transaction middleware tests

# Coverage options
[coverage:run]
source = app
omit =
    */tests/*
    */migrations/*
    */__pycache__/*
    */venv/*
    */env/*
    */site-packages/*
    */plugins/*
    */scripts/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
