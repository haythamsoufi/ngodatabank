name: Feature request
description: Suggest an idea or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: Share context so maintainers can evaluate the request.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Backoffice (Flask)
        - Website (Next.js)
        - Mobile app (Flutter)
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What problem does this solve, or what should improve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: Optional — how you imagine it working.
    validations:
      required: false
