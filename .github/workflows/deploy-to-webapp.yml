# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
#
# Container registry image names and Azure web app names below are environment-specific.
# Replace them with your org’s ACR login server and App Service names before relying on this workflow.

name: Deploy to Webapp

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - Staging
          - Production
      version:
        description: 'Image version tag (e.g., v1.1, v1.2)'
        required: true
        default: 'v1.7'
        type: string

jobs:
  validate:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment == 'Production' && 'production' || 'staging' }}
    permissions:
      contents: read
    steps:
      - name: Set deployment target
        id: config
        run: |
          if [ "${{ inputs.environment }}" = "Production" ]; then
            echo "app_name=ifrc-databank-app" >> "$GITHUB_OUTPUT"
          else
            echo "app_name=ifrc-databank-staging-2" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify publish profile credentials
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          APP_NAME: ${{ steps.config.outputs.app_name }}
        run: |
          python3 << 'EOF'
          import os, sys, xml.etree.ElementTree as ET, urllib.request, urllib.error, base64

          profile_xml = os.environ["PUBLISH_PROFILE"]
          app_name    = os.environ["APP_NAME"]

          try:
              root = ET.fromstring(profile_xml)
          except ET.ParseError as e:
              print(f"ERROR: Could not parse publish profile XML: {e}")
              sys.exit(1)

          entry = next(
              (p for p in root.findall("publishProfile") if p.get("publishMethod") == "MSDeploy"),
              None,
          )
          if entry is None:
              print("ERROR: No MSDeploy entry found in publish profile.")
              sys.exit(1)

          scm_host   = entry.get("publishUrl", "").split(":")[0]
          msdeploy   = entry.get("msdeploySite", "")
          username   = entry.get("userName", "")
          password   = entry.get("userPWD", "")

          if not scm_host.startswith(app_name):
              print(f"ERROR: Publish profile is for '{msdeploy}', expected app '{app_name}'.")
              sys.exit(1)

          token = base64.b64encode(f"{username}:{password}".encode()).decode()
          req   = urllib.request.Request(
              f"https://{scm_host}/api/settings",
              headers={"Authorization": f"Basic {token}"},
          )
          try:
              urllib.request.urlopen(req, timeout=15)
              print(f"OK: Credentials verified for '{msdeploy}' at {scm_host}")
          except urllib.error.HTTPError as e:
              print(f"ERROR: HTTP {e.code} from {scm_host} — credentials rejected or app unreachable.")
              sys.exit(1)
          except urllib.error.URLError as e:
              print(f"ERROR: Could not reach {scm_host}: {e.reason}")
              sys.exit(1)
          EOF

  build:
    runs-on: ubuntu-latest
    needs: validate
    environment: ${{ inputs.environment == 'Production' && 'production' || 'staging' }}
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # Needed so we can diff against the previous commit to detect dependency changes.
          fetch-depth: 2

      - name: Detect dependency changes (requirements/Dockerfile)
        id: deps
        shell: bash
        run: |
          set -euo pipefail

          if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            changed_files="$(git diff --name-only HEAD^..HEAD -- \
              Backoffice/requirements.txt \
              Backoffice/Dockerfile \
              Backoffice/.dockerignore || true)"
            if [ -n "${changed_files}" ]; then
              echo "Dependency-related files changed:"
              echo "${changed_files}"
              echo "deps_changed=true" >> "$GITHUB_OUTPUT"
            else
              echo "No dependency-related file changes detected."
              echo "deps_changed=false" >> "$GITHUB_OUTPUT"
            fi
          else
            # First build (or shallow history edge case). Populate registry cache.
            echo "No previous commit available; treating as deps change to warm cache."
            echo "deps_changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Free disk space
        run: |
          echo "Disk space before cleanup:"
          df -h

          # This cleanup step can take ~1-2 minutes. Only run it when disk is tight.
          # GitHub runners usually have enough space; your build was already starting with ~19G free.
          avail_gb="$(df -BG / | tail -1 | awk '{gsub("G","",$4); print $4}')"
          echo "Available disk on /: ${avail_gb}G"

          if [ "${avail_gb}" -ge 15 ]; then
            echo "Skipping cleanup (>=15G free)."
            exit 0
          fi

          echo "Running cleanup (<15G free)."
          # Remove unnecessary packages and files
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          # Clean up Python/pip caches
          sudo rm -rf ~/.cache/pip
          sudo rm -rf /root/.cache/pip
          # Clean up Docker resources
          docker system prune -af --volumes || true
          # Clean up Docker buildx cache (local only; registry cache is still used)
          docker buildx prune -af || true

          echo "Disk space after cleanup:"
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to container registry
        uses: docker/login-action@v4
        with:
          registry: ifrcimage.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # APP_VERSION in the running app = latest GitHub release (this repo). Image registry tag stays inputs.version (e.g. v1.7).
      - name: Resolve latest GitHub release for APP_VERSION
        id: gh_release
        env:
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          code="$(curl -sS -o /tmp/gh_latest_release.json -w "%{http_code}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/releases/latest")"
          if [ "$code" != "200" ]; then
            echo "::error::GitHub GET /releases/latest returned HTTP ${code}. Publish a release on ${REPO} or check API access."
            exit 1
          fi
          tag="$(jq -r '.tag_name // empty' < /tmp/gh_latest_release.json)"
          if [ -z "$tag" ] || [ "$tag" = "null" ]; then
            echo "::error::releases/latest response missing tag_name"
            exit 1
          fi
          echo "Resolved latest release tag: ${tag}"
          echo "tag_name=${tag}" >> "$GITHUB_OUTPUT"

      - name: Build and push container image (fast path; no cache export)
        if: steps.deps.outputs.deps_changed != 'true'
        uses: docker/build-push-action@v7
        with:
          context: ./Backoffice
          file: ./Backoffice/Dockerfile
          push: true
          tags: |
            ifrcimage.azurecr.io/databank_backend:${{ inputs.version }}
            ifrcimage.azurecr.io/databank_backend:${{ github.sha }}
          cache-from: type=registry,ref=ifrcimage.azurecr.io/databank_backend:buildcache
          platforms: linux/amd64
          provenance: false
          # `Backoffice/.dockerignore` keeps the build context small.
          # Used by Backoffice/app/__init__.py to generate static_url(...)?v=...
          # Make this change every deployment so clients always fetch updated JS/CSS.
          # RELEASE_VERSION = registry/deploy image tag (inputs.version). APP_VERSION = latest GitHub release tag.
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            ASSET_VERSION=${{ github.sha }}
            GIT_SHA=${{ github.sha }}
            RELEASE_VERSION=${{ inputs.version }}
            LATEST_RELEASE_TAG=${{ steps.gh_release.outputs.tag_name }}

      - name: Build and push container image (update registry build cache)
        if: steps.deps.outputs.deps_changed == 'true'
        uses: docker/build-push-action@v7
        with:
          context: ./Backoffice
          file: ./Backoffice/Dockerfile
          push: true
          tags: |
            ifrcimage.azurecr.io/databank_backend:${{ inputs.version }}
            ifrcimage.azurecr.io/databank_backend:${{ github.sha }}
          cache-from: type=registry,ref=ifrcimage.azurecr.io/databank_backend:buildcache
          # Full cache export is expensive (~2 minutes), so only do it when deps change.
          cache-to: type=registry,ref=ifrcimage.azurecr.io/databank_backend:buildcache,mode=max
          platforms: linux/amd64
          provenance: false
          # RELEASE_VERSION = registry/deploy image tag (inputs.version). APP_VERSION = latest GitHub release tag.
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            ASSET_VERSION=${{ github.sha }}
            GIT_SHA=${{ github.sha }}
            RELEASE_VERSION=${{ inputs.version }}
            LATEST_RELEASE_TAG=${{ steps.gh_release.outputs.tag_name }}

      - name: Clean up Docker resources
        if: always()
        run: |
          echo "Disk space before cleanup:"
          df -h
          # Remove dangling images and build cache
          docker builder prune -af || true
          docker buildx prune -af || true
          docker image prune -af || true
          docker system prune -af --volumes || true
          # Clean up any remaining Python/pip caches
          sudo rm -rf ~/.cache/pip || true
          sudo rm -rf /root/.cache/pip || true
          echo "Disk space after cleanup:"
          df -h

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    environment: ${{ inputs.environment == 'Production' && 'production' || 'staging' }}
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Set deployment target
        id: config
        run: |
          if [ "${{ inputs.environment }}" = "Production" ]; then
            echo "app_name=ifrc-databank-app" >> "$GITHUB_OUTPUT"
          else
            echo "app_name=ifrc-databank-staging-2" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ steps.config.outputs.app_name }}
          images: 'ifrcimage.azurecr.io/databank_backend:${{ inputs.version }}'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
