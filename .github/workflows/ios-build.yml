name: Build iOS

on:
  workflow_dispatch:  # Manual trigger only - auto-run disabled
    inputs:
      environment:
        description: 'Build environment (controls app behavior, e.g., test login buttons)'
        required: true
        type: choice
        options:
          - production
          - staging
          - development
        default: 'production'
      backend_url:
        description: 'Backend URL'
        required: true
        type: choice
        options:
          - http://localhost:5000
          - http://10.0.2.2:5000
          - https://backoffice-databank.fly.dev
          - https://your-backoffice.example.org
        default: 'https://backoffice-databank.fly.dev'
      frontend_url:
        description: 'Frontend/Website URL'
        required: true
        type: choice
        options:
          - http://localhost:3000
          - http://10.0.2.2:3000
          - https://website-databank.fly.dev
        default: 'https://website-databank.fly.dev'
      organization_config:
        description: 'Organization configuration (determines branding and app name)'
        required: true
        type: choice
        options:
          - ''
          - ifrc
        default: ''

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'  # Flutter version with Dart 3.8.0+ for flutter_lints 6.0.0
          channel: 'stable'
          cache: false  # Disabled because pubspec.lock is in MobileApp/ subdirectory

      - name: Determine Flutter project path
        id: flutter_path
        run: |
          if [ -f "MobileApp/pubspec.yaml" ]; then
            echo "path=MobileApp" >> $GITHUB_OUTPUT
          elif [ -f "pubspec.yaml" ]; then
            echo "path=." >> $GITHUB_OUTPUT
          else
            echo "Error: Could not find Flutter project"
            exit 1
          fi

      - name: Create .env file with configuration
        working-directory: ${{ steps.flutter_path.outputs.path }}
        run: |
          # Create .env file with backend and frontend URLs, and environment flag
          echo "BACKEND_URL=${{ inputs.backend_url }}" > .env
          echo "FRONTEND_URL=${{ inputs.frontend_url }}" >> .env
          # Add environment flag to .env file so it's available at runtime
          if [ "${{ inputs.environment }}" == "production" ]; then
            echo "PRODUCTION=true" >> .env
          elif [ "${{ inputs.environment }}" == "staging" ]; then
            echo "STAGING=true" >> .env
          else
            echo "DEVELOPMENT=true" >> .env
          fi
          echo "Created .env file with:"
          echo "  BACKEND_URL=${{ inputs.backend_url }}"
          echo "  FRONTEND_URL=${{ inputs.frontend_url }}"
          if [ "${{ inputs.environment }}" == "production" ]; then
            echo "  PRODUCTION=true"
          elif [ "${{ inputs.environment }}" == "staging" ]; then
            echo "  STAGING=true"
          else
            echo "  DEVELOPMENT=true"
          fi

      - name: Get Flutter dependencies
        working-directory: ${{ steps.flutter_path.outputs.path }}
        run: flutter pub get

      - name: Install CocoaPods dependencies
        working-directory: ${{ steps.flutter_path.outputs.path }}/ios
        run: |
          sudo gem install cocoapods
          pod install

      - name: Configure alternate bundle identifier and app name
        working-directory: ${{ steps.flutter_path.outputs.path }}
        run: |
          # Change bundle identifier to allow side-by-side installation
          # Original: com.ifrc.ifrcDatabankApp
          # New: com.ifrc.ifrcDatabankApp.ci
          sed -i '' 's/com\.ifrc\.ifrcDatabankApp/com.ifrc.ifrcDatabankApp.ci/g' ios/Runner.xcodeproj/project.pbxproj

          # Change app display name based on environment
          # This allows users to identify which version is which on their device
          ENV_DISPLAY_NAME="NGO Databank (CI - ${{ inputs.environment }})"
          /usr/libexec/PlistBuddy -c "Print :CFBundleDisplayName" ios/Runner/Info.plist > /dev/null 2>&1 && \
            /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName '$ENV_DISPLAY_NAME'" ios/Runner/Info.plist || \
            /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string '$ENV_DISPLAY_NAME'" ios/Runner/Info.plist

          # Update URL scheme to avoid conflicts (optional - comment out if you want same scheme)
          # /usr/libexec/PlistBuddy -c "Set :CFBundleURLTypes:0:CFBundleURLSchemes:0 'ifrcdatabankci'" ios/Runner/Info.plist

      - name: Build iOS (no codesign)
        working-directory: ${{ steps.flutter_path.outputs.path }}
        run: |
          # Build with environment flag and API keys passed via --dart-define flags from GitHub secrets
          # Backend and frontend URLs are configured via .env file (created in previous step)
          # Environment flag controls app behavior (e.g., test login buttons)
          if [ "${{ inputs.environment }}" == "production" ]; then
            ENV_FLAG="PRODUCTION=true"
          elif [ "${{ inputs.environment }}" == "staging" ]; then
            ENV_FLAG="STAGING=true"
          else
            ENV_FLAG="DEVELOPMENT=true"
          fi

          # Build with organization config if specified
          ORG_CONFIG=""
          if [ -n "${{ inputs.organization_config }}" ]; then
            ORG_CONFIG="--dart-define=ORGANIZATION_CONFIG=${{ inputs.organization_config }}"
          fi

          flutter build ios --release --no-codesign \
            --dart-define=$ENV_FLAG \
            $ORG_CONFIG \
            --dart-define=API_KEY="${{ secrets.API_KEY }}" \
            --dart-define=MOBILE_NOTIFICATION_API_KEY="${{ secrets.MOBILE_NOTIFICATION_API_KEY }}" \
            --dart-define=SENTRY_DSN="${{ secrets.SENTRY_DSN }}"

      - name: Create unsigned IPA
        working-directory: ${{ steps.flutter_path.outputs.path }}
        run: |
          # Create a temporary directory for the IPA
          mkdir -p build/ios/ipa/Payload
          # Copy the app bundle
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          # Create the IPA archive with alternate bundle identifier name
          cd build/ios/ipa
          zip -r app-unsigned-ci.ipa Payload
          cd ../../..

      - name: Archive iOS build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-ci
          path: |
            ${{ steps.flutter_path.outputs.path }}/build/ios/iphoneos/Runner.app
            ${{ steps.flutter_path.outputs.path }}/build/ios/ipa/*.ipa
          retention-days: 30

      # Optional: Build IPA with code signing (requires Apple Developer account)
      # Uncomment and configure the following steps if you have signing certificates
      # - name: Setup Xcode
      #   uses: maxim-lobanov/setup-xcode@v1
      #   with:
      #     xcode-version: latest-stable
      #
      # - name: Import Code Signing Certificate
      #   uses: apple-actions/import-codesign-certs@v2
      #   with:
      #     p12-file-base64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
      #     p12-password: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
      #
      # - name: Build IPA
      #   working-directory: MobileApp
      #   run: |
      #     # Build with appropriate dart-define flag based on selected environment
      #     if [ "${{ inputs.environment }}" == "production" ]; then
      #       flutter build ipa --release --dart-define=PRODUCTION=true
      #     elif [ "${{ inputs.environment }}" == "staging" ]; then
      #       flutter build ipa --release --dart-define=STAGING=true
      #     else
      #       flutter build ipa --release
      #     fi
