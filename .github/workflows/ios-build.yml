name: iOS Build

on:
  push:
    tags:
      - 'mobile/v*'
  workflow_dispatch:
    inputs:
      backend_url:
        description: 'Backend URL (also sets build profile: databank.ifrc.org → production, fly.dev / IFRC staging → staging, localhost / emulator → development)'
        required: true
        type: choice
        options:
          - http://localhost:5000
          - http://10.0.2.2:5000
          - https://backoffice-databank.fly.dev
          - https://databank-stage.ifrc.org
          - https://databank.ifrc.org
        default: 'https://databank.ifrc.org'
      frontend_url:
        description: 'Frontend/Website URL'
        required: true
        type: choice
        options:
          - http://localhost:3000
          - http://10.0.2.2:3000
          - https://website-databank.fly.dev
        default: 'https://website-databank.fly.dev'
      organization_config:
        description: 'Organization configuration (determines branding and app name)'
        required: true
        type: choice
        options:
          - ifrc
          - ''
        default: 'ifrc'

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          # Default image Xcode can lag; plugins may reference newer SDK APIs (e.g. device_info_plus 12+).
          xcode-version: latest-stable

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # Keep in sync with MobileApp/pubspec.yaml. Flutter 3.41.6 stable ships Dart 3.11.4.
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: false  # Disabled because pubspec.lock is in MobileApp/ subdirectory

      - name: Determine Flutter project path
        id: flutter_path
        run: |
          if [ -f "MobileApp/pubspec.yaml" ]; then
            echo "path=MobileApp" >> $GITHUB_OUTPUT
          elif [ -f "pubspec.yaml" ]; then
            echo "path=." >> $GITHUB_OUTPUT
          else
            echo "Error: Could not find Flutter project"
            exit 1
          fi

      - name: Resolve build profile from backend URL
        id: resolve_env
        run: |
          BACKEND="${{ inputs.backend_url }}"
          # Local / emulator → development (quick login, WebView localhost rules)
          if [[ "$BACKEND" == *"localhost"* ]] || [[ "$BACKEND" == *"127.0.0.1"* ]] || [[ "$BACKEND" == *"10.0.2.2"* ]]; then
            PROFILE=development
          # Fly preview or IFRC staging host → staging
          elif [[ "$BACKEND" == *"fly.dev"* ]] || [[ "$BACKEND" == *"-stage.ifrc.org"* ]]; then
            PROFILE=staging
          # Production IFRC backoffice
          elif [[ "$BACKEND" == *"databank.ifrc.org"* ]]; then
            PROFILE=production
          else
            echo "Unknown BACKEND_URL, defaulting profile to production: $BACKEND" >&2
            PROFILE=production
          fi
          echo "profile=$PROFILE" >> "$GITHUB_OUTPUT"
          echo "Resolved build profile: $PROFILE"

      - name: Create .env file with configuration
        working-directory: ${{ steps.flutter_path.outputs.path }}
        run: |
          echo "BACKEND_URL=${{ inputs.backend_url }}" > .env
          echo "FRONTEND_URL=${{ inputs.frontend_url }}" >> .env
          case "${{ steps.resolve_env.outputs.profile }}" in
            production) echo "PRODUCTION=true" >> .env ;;
            staging)    echo "STAGING=true" >> .env ;;
            *)          echo "DEVELOPMENT=true" >> .env ;;
          esac
          echo "Created .env (profile=${{ steps.resolve_env.outputs.profile }}):"
          echo "  BACKEND_URL=${{ inputs.backend_url }}"
          echo "  FRONTEND_URL=${{ inputs.frontend_url }}"
          cat .env

      - name: Prepare Firebase iOS config (CI placeholder)
        working-directory: ${{ steps.flutter_path.outputs.path }}
        run: |
          cp ios/Runner/GoogleService-Info.plist.example ios/Runner/GoogleService-Info.plist

      - name: Get Flutter dependencies
        working-directory: ${{ steps.flutter_path.outputs.path }}
        run: flutter pub get

      - name: Analyze Dart (catch dependency/API issues before CocoaPods)
        working-directory: ${{ steps.flutter_path.outputs.path }}
        run: flutter analyze --no-fatal-infos

      - name: Install CocoaPods dependencies
        working-directory: ${{ steps.flutter_path.outputs.path }}/ios
        run: |
          sudo gem install cocoapods
          # --repo-update: refresh CocoaPods trunk when FlutterFire bumps Firebase (avoids lock/snapshot mismatches)
          pod install --repo-update

      - name: Configure alternate bundle identifier and app name
        working-directory: ${{ steps.flutter_path.outputs.path }}
        run: |
          # Change bundle identifier to allow side-by-side installation
          # Original: com.ifrc.ifrcDatabankApp
          # New: com.ifrc.ifrcDatabankApp.ci
          sed -i '' 's/com\.ifrc\.ifrcDatabankApp/com.ifrc.ifrcDatabankApp.ci/g' ios/Runner.xcodeproj/project.pbxproj

          # Change app display name based on environment / organization
          # IFRC profile → home screen name "IFRC Databank"; otherwise CI-style NGO Databank label
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ORG="${{ inputs.organization_config }}"
          else
            # push (e.g. mobile/v* tags) has no workflow_dispatch inputs — default org matches workflow default (ifrc)
            ORG=ifrc
          fi
          if [ "$ORG" = "ifrc" ]; then
            ENV_DISPLAY_NAME="IFRC Databank"
          else
            ENV_DISPLAY_NAME="NGO Databank (CI - ${{ steps.resolve_env.outputs.profile }})"
          fi
          /usr/libexec/PlistBuddy -c "Print :CFBundleDisplayName" ios/Runner/Info.plist > /dev/null 2>&1 && \
            /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName '$ENV_DISPLAY_NAME'" ios/Runner/Info.plist || \
            /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string '$ENV_DISPLAY_NAME'" ios/Runner/Info.plist

          # Update URL scheme to avoid conflicts (optional - comment out if you want same scheme)
          # /usr/libexec/PlistBuddy -c "Set :CFBundleURLTypes:0:CFBundleURLSchemes:0 'ifrcdatabankci'" ios/Runner/Info.plist

      - name: Build iOS (no codesign)
        working-directory: ${{ steps.flutter_path.outputs.path }}
        run: |
          # Compile-time flag must match .env (derived from BACKEND_URL in resolve_env step)
          case "${{ steps.resolve_env.outputs.profile }}" in
            production) ENV_FLAG="PRODUCTION=true" ;;
            staging)    ENV_FLAG="STAGING=true" ;;
            *)          ENV_FLAG="DEVELOPMENT=true" ;;
          esac

          # Build with organization config if specified
          ORG_CONFIG=""
          if [ -n "${{ inputs.organization_config }}" ]; then
            ORG_CONFIG="--dart-define=ORGANIZATION_CONFIG=${{ inputs.organization_config }}"
          fi

          flutter build ios --release --no-codesign \
            --dart-define=$ENV_FLAG \
            $ORG_CONFIG \
            --dart-define=MOBILE_APP_API_KEY="${{ secrets.MOBILE_APP_API_KEY }}" \
            --dart-define=SENTRY_DSN="${{ secrets.SENTRY_DSN }}"

      - name: Create unsigned IPA
        working-directory: ${{ steps.flutter_path.outputs.path }}
        run: |
          # Create a temporary directory for the IPA
          mkdir -p build/ios/ipa/Payload
          # Copy the app bundle
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          # Create the IPA archive with alternate bundle identifier name
          cd build/ios/ipa
          zip -r app-unsigned-ci.ipa Payload
          cd ../../..

      - name: Archive iOS build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-ci
          path: |
            ${{ steps.flutter_path.outputs.path }}/build/ios/iphoneos/Runner.app
            ${{ steps.flutter_path.outputs.path }}/build/ios/ipa/*.ipa
          retention-days: 30

      # Optional: Build IPA with code signing (requires Apple Developer account)
      # Uncomment and configure the following steps if you have signing certificates
      # - name: Setup Xcode
      #   uses: maxim-lobanov/setup-xcode@v1
      #   with:
      #     xcode-version: latest-stable
      #
      # - name: Import Code Signing Certificate
      #   uses: apple-actions/import-codesign-certs@v2
      #   with:
      #     p12-file-base64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
      #     p12-password: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
      #
      # - name: Build IPA
      #   working-directory: MobileApp
      #   run: |
      #     # Use same profile as BACKEND_URL (see Resolve build profile from backend URL step)
      #     flutter build ipa --release --dart-define=PRODUCTION=true
      #     # or STAGING=true / DEVELOPMENT=true
      #
      # - name: Upload IPA
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: ios-ipa
      #     path: MobileApp/build/ios/ipa/*.ipa
      #     retention-days: 30
