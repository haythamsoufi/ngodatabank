      # - name: Create keystore properties
      #   run: |
      #     echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" > ${{ steps.flutter_path.outputs.path }}/android/key.properties
      #     echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> ${{ steps.flutter_path.outputs.path }}/android/key.properties
      #     echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> ${{ steps.flutter_path.outputs.path }}/android/key.properties
      #     echo "storeFile=${{ secrets.ANDROID_KEYSTORE_FILE }}" >> ${{ steps.flutter_path.outputs.path }}/android/key.properties
