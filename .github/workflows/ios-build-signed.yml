name: Build iOS (Signed IPA)

on:
  workflow_dispatch:  # Manual trigger only for security
    inputs:
      production:
        description: 'Build for production (true/false)'
        required: false
        default: 'true'
        type: boolean
      organization_config:
        description: 'Organization configuration (determines branding and app name)'
        required: true
        type: choice
        options:
          - ''
          - ifrc
        default: ''

jobs:
  build-ios-signed:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'  # Flutter version with Dart 3.8.0+ for flutter_lints 6.0.0
          channel: 'stable'
          cache: true

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Determine Flutter project path
        id: flutter_path
        run: |
          if [ -f "MobileApp/pubspec.yaml" ]; then
            echo "path=MobileApp" >> $GITHUB_OUTPUT
          elif [ -f "pubspec.yaml" ]; then
            echo "path=." >> $GITHUB_OUTPUT
          else
            echo "Error: Could not find Flutter project"
            exit 1
          fi

      - name: Get Flutter dependencies
        working-directory: ${{ steps.flutter_path.outputs.path }}
        run: flutter pub get

      - name: Install CocoaPods dependencies
        working-directory: ${{ steps.flutter_path.outputs.path }}/ios
        run: |
          sudo gem install cocoapods
          pod install

      - name: Import Code Signing Certificate
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}

      - name: Build IPA
        working-directory: ${{ steps.flutter_path.outputs.path }}
        run: |
          # Build with organization config if specified
          ORG_CONFIG=""
          if [ -n "${{ inputs.organization_config }}" ]; then
            ORG_CONFIG="--dart-define=ORGANIZATION_CONFIG=${{ inputs.organization_config }}"
          fi

          # Build with API keys passed via --dart-define flags from GitHub secrets
          flutter build ipa --release \
            --dart-define=PRODUCTION=${{ github.event.inputs.production }} \
            $ORG_CONFIG \
            --dart-define=API_KEY="${{ secrets.API_KEY }}" \
            --dart-define=MOBILE_NOTIFICATION_API_KEY="${{ secrets.MOBILE_NOTIFICATION_API_KEY }}" \
            --dart-define=SENTRY_DSN="${{ secrets.SENTRY_DSN }}"
        env:
          PRODUCTION: ${{ github.event.inputs.production }}

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ github.run_number }}
          path: ${{ steps.flutter_path.outputs.path }}/build/ios/ipa/*.ipa
          retention-days: 90

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ${{ steps.flutter_path.outputs.path }}/build/ios/**/*.log
          retention-days: 7
