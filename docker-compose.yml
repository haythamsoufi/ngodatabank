services:
  db:
    image: pgvector/pgvector:pg15
    container_name: ngo-databank-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-ngo_databank}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: "no"

  db-test:
    image: pgvector/pgvector:pg15
    container_name: ngo-databank-postgres-test
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB_TEST:-ngo_databank_test}
    ports:
      - "5433:5432"
    volumes:
      - pgdata_test:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB_TEST:-ngo_databank_test}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: "no"

  db-init:
    build: ./Backoffice
    container_name: ngo-databank-db-init
    volumes:
      - ./Backoffice/scripts:/app/scripts
      - ./Backoffice/migrations:/app/migrations
      - ./Backoffice/app:/app/app
    environment:
      - FLASK_CONFIG=${BACKOFFICE_FLASK_CONFIG:-development}
      - FLASK_APP=run:app
      - SECRET_KEY=${SECRET_KEY:-vxE-FbviIoGmGoivz1-cmqDhLqGsLv_e9BJ0RP0YNcE}
      - DATABASE_URL=postgresql+psycopg2://app:app@db:5432/ngo_databank
      - API_KEY=${API_KEY:-databank2026}
      - ALLOW_INIT_DATA_PROD=${ALLOW_INIT_DATA_PROD:-true}
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        echo '=== Checking migration files ===' &&
        ls -la /app/migrations/versions/ &&
        echo '' &&
        echo '=== Verifying target migration file exists ===' &&
        test -f /app/migrations/versions/add_logged_out_at_to_user_devices.py && echo 'File exists: YES' || echo 'File exists: NO' &&
        echo '' &&
        echo '=== Checking Python can import migration file ===' &&
        python -c 'import sys; sys.path.insert(0, \"/app\"); import importlib.util; spec = importlib.util.spec_from_file_location(\"migration\", \"/app/migrations/versions/add_logged_out_at_to_user_devices.py\"); module = importlib.util.module_from_spec(spec); spec.loader.exec_module(module); print(f\"Successfully imported! Revision: {module.revision}, Down revision: {module.down_revision}\")' 2>&1 || echo 'Python import failed' &&
        echo '' &&
        echo '=== Running database migration ===' &&
        echo 'Executing: flask db upgrade' &&
        flask db upgrade 2>&1 &&
        echo '' &&
        echo '✓ flask db upgrade completed successfully' &&
        echo 'Checking current database version...' &&
        flask db current 2>&1 &&
        echo '' &&
        echo '=== Seeding RBAC permissions/roles ===' &&
        echo 'Executing: flask rbac seed' &&
        flask rbac seed 2>&1 &&
        echo '' &&
        echo '=== Fixing database collation version (if needed) ===' &&
        python -c 'import os; from sqlalchemy import create_engine, text; engine = create_engine(os.environ.get(\"DATABASE_URL\"), isolation_level=\"AUTOCOMMIT\"); conn = engine.connect(); conn.execute(text(\"ALTER DATABASE ngo_databank REFRESH COLLATION VERSION\")); conn.close()' 2>&1 || echo 'Note: Collation version refresh skipped (may require superuser privileges or already be up to date)' &&
        echo '' &&
        echo 'Creating default data...' &&
        PYTHONPATH=/app python scripts/init_data.py &&
        echo 'Database initialization complete!'
      "
    restart: "no"

  # LibreTranslate is optional - uncomment to enable translation services
  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: libretranslate
    ports:
      - "9000:5000"  # Using 9000 on host to avoid conflict with backoffice on 5000
    volumes:
      - ./Backoffice/libretranslate_data:/app/data
    environment:
      - LT_UPDATE_MODELS=true
      - LT_LOAD_ONLY=en,fr,es,ar,zh,ru,hi
    restart: unless-stopped

  backoffice:
    build: ./Backoffice
    container_name: ngo-databank-backoffice
    ports:
      - "5000:5000"
    environment:
      - FLASK_CONFIG=${BACKOFFICE_FLASK_CONFIG:-development}
      - SECRET_KEY=${SECRET_KEY:-vxE-FbviIoGmGoivz1-cmqDhLqGsLv_e9BJ0RP0YNcE}
      - DATABASE_URL=postgresql+psycopg2://app:app@db:5432/ngo_databank
      - DEV_DATABASE_URL=postgresql+psycopg2://app:app@db:5432/ngo_databank
      - TEST_DATABASE_URL=postgresql+psycopg2://app:app@db-test:5432/ngo_databank_test
      - API_KEY=${API_KEY:-databank2026}
      - APP_VERSION=1.0.0
      - LOG_LEVEL=INFO
      # Push notifications (optional): mount your Firebase JSON under Backoffice/ and set these in .env
      - FCM_SERVICE_ACCOUNT_PATH=${FCM_SERVICE_ACCOUNT_PATH:-}
      - FCM_PROJECT_ID=${FCM_PROJECT_ID:-}
      - SKIP_MIGRATIONS=1  # Migrations handled by db-init service
      - SSE_ENABLED=false  # Disable SSE by default (set to true to enable)
      # Optional: Uncomment and set these if you need email/translation services
      # - EMAIL_API_KEY=${EMAIL_API_KEY:-}
      # - EMAIL_API_KEY_STG=${EMAIL_API_KEY_STG:-}
      # - IFRC_TRANSLATE_API_KEY=${IFRC_TRANSLATE_API_KEY:-}  # optional hosted translation (env name retained)
      - LIBRE_TRANSLATE_URL=http://libretranslate:5000  # LibreTranslate service URL
    volumes:
      - ./Backoffice/app:/app/app
      - ./Backoffice/plugins:/app/plugins
      - ./Backoffice/migrations:/app/migrations  # To be able to modify migrations if needed
      - ./Backoffice/tests:/app/tests  # Bind-mount tests for live iteration
      - ./Backoffice/instance:/app/instance
      - ./Backoffice/uploads:/data/uploads
      - ./Backoffice/logs:/var/log/ngo-databank
      - ./Backoffice/run.py:/app/run.py
      - ./Backoffice/requirements.txt:/app/requirements.txt
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      libretranslate:  # LibreTranslate service dependency
        condition: service_started
    restart: "no"

  website:
    build:
      context: ./Website
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5000
    container_name: ngo-databank-website
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NEXT_PUBLIC_API_URL=http://localhost:5000
      - NEXT_INTERNAL_API_URL=http://backoffice:5000
    depends_on:
      backoffice:
        condition: service_started
    restart: "no"

volumes:
  pgdata:
  pgdata_test:
