name: ngo_databank_app
description: NGO Databank Mobile Application - Generic mobile app for NGO databank ecosystems (configurable for any organization)
publish_to: 'none'
version: 1.0.0+1

# CI pins Flutter 3.41.6 in .github/workflows (android-build / ios-build*). That SDK
# ships Dart 3.11.x — keep this `environment.sdk` and caps below aligned with it.
# When CI upgrades Flutter further (e.g. Dart 3.12+), you can relax caps:
# font_awesome_flutter → ^11.0.0, flutter_local_notifications → ^21.0.0, etc.
environment:
  sdk: '>=3.9.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # WebView and HTTP
  flutter_inappwebview: ^6.0.0
  http: ^1.2.0
  dio: ^5.7.0
  flutter_dotenv: ^6.0.0
  web_socket_channel: ^3.0.1
  flutter_html: ^3.0.0-beta.2

  # Storage
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.2.0
  sqflite: ^2.3.0
  path: ^1.9.0

  # State Management
  provider: ^6.1.1

  # Dependency Injection
  get_it: ^8.0.3

  # Code generation annotations (freezed + json_serializable)
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Connectivity — stay on 6.x until CI/Xcode supports NWPath.isUltraConstrained (connectivity_plus 7+)
  connectivity_plus: ">=6.1.0 <7.0.0"

  # Navigation and URLs
  url_launcher: ^6.2.0
  app_links: ^6.3.3
  go_router: ^14.8.1

  # Firebase — iOS native versions come from committed ios/Podfile.lock (CocoaPods).
  # After bumping firebase_* (or switching to ^ ranges), run GitHub Actions
  # "Regenerate iOS Podfile.lock" (.github/workflows/ios-regenerate-podfile-lock.yml),
  # then commit MobileApp/ios/Podfile.lock (and pubspec.lock) with the dependency change.
  # PENDING: firebase_core 4.x / firebase_messaging 16.x / firebase_analytics 12.x bumps
  # Firebase iOS SDK from 10.x to 12.x — Podfile.lock MUST be regenerated via the GitHub Action before merging.
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3
  firebase_analytics: ^12.2.0
  # 21+ needs Dart 3.10 — cap below until CI uses Dart 3.10+
  flutter_local_notifications: ">=19.5.0 <21.0.0"

  # UI
  cached_network_image: ^3.3.0
  fl_chart: ">=0.70.2 <2.0.0"
  font_awesome_flutter: ">=10.9.0 <11.0.0"
  # In-app PDF viewer — iOS uses PDFKit (no CocoaPod needed); Android uses PdfRenderer
  pdfx: ^2.9.0
  # File sharing (share sheet) and temp-directory access for PDF share
  share_plus: ^10.0.0
  path_provider: ^2.1.0

  # Wide range so both Flutter SDK pins resolve (e.g. 0.19.x vs 0.20.x via flutter_localizations)
  intl: ">=0.19.0 <0.21.0"
  cupertino_icons: ^1.0.6
  # 12.x calls NSProcessInfo.isiOSAppOnVision (iOS 18 SDK / Xcode 16+). Cap for CI runners that use older Xcode.
  device_info_plus: ">=11.3.0 <12.0.0"
  package_info_plus: ^9.0.1
  uuid: ^4.5.1

  # Error Tracking
  sentry_flutter: ^9.16.0
  home_widget: ^0.9.0
  quick_actions: ^1.1.0
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  html: ^0.15.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  build_runner: ^2.4.14
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  widgetbook_annotation: ^3.2.0
  widgetbook: ^3.10.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    # Hero slideshow (explicit paths so missing files fail fast at build time)
    - assets/images/hero/slide_01.jpg
    - assets/images/hero/slide_02.jpg
    - assets/images/hero/slide_03.jpg
    - assets/config/
    - assets/data/restcountries_latlng.json
    - assets/data/world_countries.geojson
    - assets/data/iso3_to_iso2.json
    - .env

  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Regular.ttf
        - asset: assets/fonts/Montserrat-Bold.ttf
          weight: 700
        - asset: assets/fonts/Montserrat-SemiBold.ttf
          weight: 600
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf
        - asset: assets/fonts/Tajawal-Bold.ttf
          weight: 700
        - asset: assets/fonts/Tajawal-Medium.ttf
          weight: 500

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 23
  adaptive_icon_background: "#011E41"
  adaptive_icon_foreground: "assets/images/app_icon.png"
