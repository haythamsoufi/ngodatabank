name: ngo_databank_app
description: NGO Databank Mobile Application - Generic mobile app for NGO databank ecosystems (configurable for any organization)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # WebView and HTTP
  flutter_inappwebview: ^6.0.0
  http: ^1.2.0
  flutter_dotenv: ^6.0.0
  web_socket_channel: ^3.0.1
  flutter_html: ^3.0.0-beta.2

  # Storage
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.2.0
  sqflite: ^2.3.0
  path: ^1.9.0

  # State Management
  provider: ^6.1.1

  # Connectivity
  connectivity_plus: ^7.1.0

  # Navigation and URLs
  url_launcher: ^6.2.0

  # Notifications
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3
  flutter_local_notifications: ^21.0.0

  # UI
  cached_network_image: ^3.3.0
  fl_chart: ^1.2.0
  font_awesome_flutter: ^11.0.0

  # Utilities
  intl: ^0.20.2
  cupertino_icons: ^1.0.6
  # 12.x requires Dart >=3.7 / Flutter >=3.29; keep 11.x for Dart 3.6 CI
  device_info_plus: ^11.3.0
  package_info_plus: ^9.0.1
  uuid: ^4.5.1

  # Error Tracking
  sentry_flutter: ^9.16.0
  home_widget: ^0.9.0
  quick_actions: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  # 6.x requires Dart ^3.8.0; keep 5.x for Flutter 3.27 / Dart 3.6 CI runners
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/config/
    - .env

  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Regular.ttf
        - asset: assets/fonts/Montserrat-Bold.ttf
          weight: 700
        - asset: assets/fonts/Montserrat-SemiBold.ttf
          weight: 600
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf
        - asset: assets/fonts/Tajawal-Bold.ttf
          weight: 700
        - asset: assets/fonts/Tajawal-Medium.ttf
          weight: 500

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 23
  adaptive_icon_background: "#011E41"
  adaptive_icon_foreground: "assets/images/app_icon.png"
